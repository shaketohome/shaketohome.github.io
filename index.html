<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ShakeToHome Bhupalpally</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Fixed Header -->
    <header class="header">
        <div class="brand">
            <h1>ShakeToHome</h1>
        </div>
        <div class="header-actions">
            <a href="https://wa.me/910000000000" target="_blank" class="icon-btn" aria-label="WhatsApp Us">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>
            </a>
            <button class="icon-btn cart-btn" id="header-cart-btn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                <span class="cart-badge" id="cart-badge">0</span>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main>
        <!-- Hero Section -->
        <section class="hero">
            <h2>Order shakes & juices.<br><span>Discover the best drinks.</span></h2>
            
            <div class="input-group">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                <input type="text" id="location-input" placeholder="Fetching location..." readonly>
            </div>

            <div class="input-group">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                <input type="text" id="search-input" placeholder="Search for Oreo, Lassi, etc...">
            </div>
        </section>

        <!-- Product Grid -->
        <section class="menu-section">
            <div class="grid" id="product-grid">
                <!-- Products dynamically injected via JavaScript -->
            </div>
        </section>
    </main>

    <!-- Sticky Bottom Cart Bar -->
    <div class="bottom-cart" id="bottom-cart">
        <div class="cart-info">
            <span id="bottom-cart-items">1 item</span>
            <span id="bottom-cart-total">₹120</span>
        </div>
        <button class="order-btn" id="order-btn">
            Order Now
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
        </button>
    </div>

    <script src="script.js"></script>
</body>
</html>
