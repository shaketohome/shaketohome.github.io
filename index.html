<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShakeToHome</title>
<link rel="stylesheet" href="style.css">
</head>

<body onload="initApp()">

<!-- HEADER -->
<header class="header">
  <div class="logo">🥤 ShakeToHome</div>

  <div class="nav">
    <button class="btn white" onclick="openWhatsApp()">WhatsApp</button>
    <button class="btn black" onclick="toggleCart()">Cart (<span id="cartCount">0</span>)</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Order shakes & juices.<br>Discover best drinks.</h1>

  <!-- LOCATION INPUT -->
  <input id="locationInput" placeholder="📍 Tap to allow location" readonly onclick="getLocation()">

  <input placeholder="Search shakes...">
</section>

<!-- PRODUCTS -->
<section class="grid">

  <!-- ITEM 1 -->
  <div class="item" data-name="Oreo" data-price="120">
    <img src="https://images.unsplash.com/photo-1586917049334-2f3d1c77d5b1?auto=format&fit=crop&w=300&q=80">
    <h3>Oreo</h3>
    <p>₹120</p>
    <div class="controls">
      <button onclick="addToCart('Oreo',120,0)">Add</button>
    </div>
  </div>

  <!-- ITEM 2 -->
  <div class="item" data-name="KitKat" data-price="130">
    <img src="https://images.unsplash.com/photo-1627308595229-7830a5c91f9f?auto=format&fit=crop&w=300&q=80">
    <h3>KitKat</h3>
    <p>₹130</p>
    <div class="controls">
      <button onclick="addToCart('KitKat',130,1)">Add</button>
    </div>
  </div>

  <!-- ITEM 3 -->
  <div class="item" data-name="Strawberry" data-price="110">
    <img src="https://images.unsplash.com/photo-1553531889-56cc480ac5cb?auto=format&fit=crop&w=300&q=80">
    <h3>Strawberry</h3>
    <p>₹110</p>
    <div class="controls">
      <button onclick="addToCart('Strawberry',110,2)">Add</button>
    </div>
  </div>

  <!-- ITEM 4 -->
  <div class="item" data-name="Chocolate" data-price="130">
    <img src="https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&w=300&q=80">
    <h3>Chocolate</h3>
    <p>₹130</p>
    <div class="controls">
      <button onclick="addToCart('Chocolate',130,3)">Add</button>
    </div>
  </div>

  <!-- ITEM 5 -->
  <div class="item" data-name="Lassi" data-price="90">
    <img src="https://images.unsplash.com/photo-1600718374662-0483d2b9da44?auto=format&fit=crop&w=300&q=80">
    <h3>Lassi</h3>
    <p>₹90</p>
    <div class="controls">
      <button onclick="addToCart('Lassi',90,4)">Add</button>
    </div>
  </div>

  <!-- ITEM 6 -->
  <div class="item" data-name="Watermelon" data-price="80">
    <img src="https://images.unsplash.com/photo-1553530666-ba11a7da3888?auto=format&fit=crop&w=300&q=80">
    <h3>Watermelon</h3>
    <p>₹80</p>
    <div class="controls">
      <button onclick="addToCart('Watermelon',80,5)">Add</button>
    </div>
  </div>

  <!-- ITEM 7 -->
  <div class="item" data-name="Pineapple" data-price="85">
    <img src="https://images.unsplash.com/photo-1589308078054-8322a5d53e21?auto=format&fit=crop&w=300&q=80">
    <h3>Pineapple</h3>
    <p>₹85</p>
    <div class="controls">
      <button onclick="addToCart('Pineapple',85,6)">Add</button>
    </div>
  </div>

  <!-- ITEM 8 -->
  <div class="item" data-name="Grapes" data-price="85">
    <img src="https://images.unsplash.com/photo-1572441710534-68054a6b6c8c?auto=format&fit=crop&w=300&q=80">
    <h3>Grapes</h3>
    <p>₹85</p>
    <div class="controls">
      <button onclick="addToCart('Grapes',85,7)">Add</button>
    </div>
  </div>

  <!-- ITEM 9 -->
  <div class="item" data-name="Black Currant" data-price="120">
    <img src="https://images.unsplash.com/photo-1505253213348-cd54c5a9d8c7?auto=format&fit=crop&w=300&q=80">
    <h3>Black Currant</h3>
    <p>₹120</p>
    <div class="controls">
      <button onclick="addToCart('Black Currant',120,8)">Add</button>
    </div>
  </div>

</section>

<!-- BOTTOM ORDER BAR -->
<div class="orderBar" id="orderBar">
  <span id="orderText">0 items</span>
  <button onclick="checkout()">Order Now</button>
</div>

<script src="script.js"></script>
</body>
</html>
