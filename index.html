<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShakeToHome</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header class="header">
  <div class="logo">🥤 ShakeToHome</div>

  <div class="nav">
    <a href="https://wa.me/917702622925" class="btn white">WhatsApp</a>
    <button class="btn black">Cart</button>
  </div>
</header>

<!-- HERO -->
<section class="hero">
  <h1>Order shakes & juices.<br>Discover best drinks.</h1>

  <input id="locationInput" placeholder="📍 Tap to allow location" onclick="getLocation()">
  <input placeholder="Search shakes...">
</section>

<!-- GRID -->
<section class="grid">

  <!-- 9 PRODUCTS -->
  <div class="item">
    <img src="https://images.unsplash.com/photo-1586917049334-2f3d1c77d5b1?auto=format&fit=crop&w=300&q=80">
    <h3>Oreo</h3><p>₹120</p>
    <button onclick="order('Oreo')">Add</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1627308595229-7830a5c91f9f?auto=format&fit=crop&w=300&q=80">
    <h3>KitKat</h3><p>₹130</p>
    <button onclick="order('KitKat')">Add</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1553531889-56cc480ac5cb?auto=format&fit=crop&w=300&q=80">
    <h3>Strawberry</h3><p>₹110</p>
    <button onclick="order('Strawberry')">Add</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1572490122747-3968b75cc699?auto=format&fit=crop&w=300&q=80">
    <h3>Chocolate</h3><p>₹130</p>
    <button onclick="order('Chocolate')">Add</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1600718374662-0483d2b9da44?auto=format&fit=crop&w=300&q=80">
    <h3>Lassi</h3><p>₹90</p>
    <button onclick="order('Lassi')">Add</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1553530666-ba11a7da3888?auto=format&fit=crop&w=300&q=80">
    <h3>Watermelon</h3><p>₹80</p>
    <button onclick="order('Watermelon')">Add</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1589308078054-8322a5d53e21?auto=format&fit=crop&w=300&q=80">
    <h3>Pineapple</h3><p>₹85</p>
    <button onclick="order('Pineapple')">Add</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1572441710534-68054a6b6c8c?auto=format&fit=crop&w=300&q=80">
    <h3>Grapes</h3><p>₹85</p>
    <button onclick="order('Grapes')">Add</button>
  </div>

  <div class="item">
    <img src="https://images.unsplash.com/photo-1505253213348-cd54c5a9d8c7?auto=format&fit=crop&w=300&q=80">
    <h3>Black Currant</h3><p>₹120</p>
    <button onclick="order('Black Currant')">Add</button>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
